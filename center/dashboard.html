<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Piano Deri Merkez V6.1</title>
  <link rel="stylesheet" href="../assets/piano-theme.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
  #newResNotifStack{position:fixed;right:20px;bottom:20px;z-index:9998;width:min(360px,calc(100vw - 40px));display:flex;flex-direction:column;gap:10px;align-items:stretch;pointer-events:none}
  .new-res-toast{background:rgba(20,83,45,.97);border:1px solid rgba(34,197,94,.6);border-radius:14px;padding:13px 18px;box-shadow:0 8px 32px rgba(0,0,0,.6);cursor:pointer;pointer-events:auto}
  .new-res-toast .nr-title{font-size:13px;font-weight:800;color:#bbf7d0;margin-bottom:6px;display:flex;align-items:center;gap:7px}
  .new-res-toast .nr-list{font-size:12px;color:#86efac;line-height:1.8}
  .new-res-toast .nr-close{float:right;color:#86efac;font-size:14px;cursor:pointer;opacity:.7;margin-left:10px}
  .new-res-toast .nr-close:hover{opacity:1}
  @keyframes blink-row{
    0%,100%{background:rgba(34,197,94,.4)!important;box-shadow:inset 0 0 14px rgba(34,197,94,.5)}
    50%{background:rgba(34,197,94,.08)!important;box-shadow:none}
  }
  .row-new-blink > td{animation:blink-row 0.7s ease-in-out infinite!important}
  </style>
</head>
<body>
<div class="app">

<!-- Yeni rezervasyon bildirimleri: yeni gelen alta eklenir, eski bildirimler yukarı çıkar -->
<div id="newResNotifStack"></div>

  <div class="app-brand">
    <div class="p">P</div>
    <div class="name">PIANO DERİ</div>
    <div class="sub">MERKEZ OPERASYON — V6.1</div>
  </div>

  <div id="apiWarning" class="notice" style="display:none"></div>

  <!-- Üst çubuk -->
  <div class="panel-card" style="padding:11px 14px">
    <div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:8px">
        <label style="margin:0;white-space:nowrap">Tarih</label>
        <input type="date" id="datePicker" onchange="activeHotelFilter='';document.getElementById('hotelFilterSel').value='';loadAll()" style="width:155px">
        <span id="dateDisplay" style="font-size:13px;color:var(--gold2);font-weight:700"></span>
      </div>
      <button class="btn-dark btn-sm" onclick="loadAll()">↺</button>
      <select id="hotelFilterSel" onchange="" style="height:32px;border-radius:7px;border:1px solid var(--b);background:var(--bg3);color:var(--text);padding:0 8px;min-width:140px;max-width:200px;font-size:12px">
        <option value="">— Tüm Oteller —</option>
      </select>
      <button class="btn-gold btn-sm" onclick="applyHotelFilter()" style="padding:6px 14px">Göster</button>
      <div style="flex:1"></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn-gold btn-sm" onclick="exportXLS('all')" style="padding:8px 12px" title="O günkü tüm rezervasyonlar">⬇ Tümü</button>
        <button class="btn-gold btn-sm" onclick="exportXLS('new')" style="padding:8px 12px;background:linear-gradient(135deg,#4ade80,#16a34a);color:#052e16" title="Son exporttan sonra eklenenler (iptal hariç)">⬇ Yeni</button>
        <button class="btn-gold btn-sm" onclick="exportPlakasiz()" style="padding:8px 12px;background:linear-gradient(135deg,#f97316,#ea580c);color:#fff" title="Plaka girilmemiş rezervasyonları aktar">⬇ Plakasız</button>
      </div>
    </div>
  </div>

  <div class="center-layout">

    <!-- Sol Menü -->
    <aside class="side-menu panel-card">
      <button id="mnHome"   class="btn-dark active-menu" onclick="showSection('homeSection','mnHome')">🏠 Ana Ekran</button>
      <button id="mnManual" class="btn-dark" onclick="showSection('manualSection','mnManual')">✏️ Elle Rezervasyon</button>
      <button id="mnRapor"  class="btn-dark" onclick="showSection('raporSection','mnRapor');loadRapor()">📊 Raporlar</button>
      <button id="mnStaff"  class="btn-dark" onclick="showSection('staffSection','mnStaff')">👥 Personeller</button>
      <button id="mnOff"    class="btn-dark" onclick="showSection('offSection','mnOff')">🏖 İzin Girişi</button>
      <button id="mnPlaka"  class="btn-dark" onclick="showSection('plakaSection','mnPlaka')">🚗 Araçlar</button>

    </aside>

    <!-- Ana İçerik -->
    <main style="min-width:0;overflow:hidden;">

      <!-- ANA EKRAN -->
      <section id="homeSection" class="section active">
        <div id="reservationList"></div>
      </section>

      <!-- ELLE REZERVASYON -->
      <section id="manualSection" class="section">
        <div class="panel-card">
          <div class="top-bar">
            <h2 id="manualTitle">✏️ Elle Rezervasyon</h2>
          </div>
          <input type="hidden" id="editResId">
          <div class="grid grid4">
            <div><label>Otel</label><input id="centerHotel" list="hotelListEl" placeholder="Otel adı"><datalist id="hotelListEl"></datalist></div>
            <div><label>Tarih</label><input type="date" id="centerDate"></div>
            <div><label>Saat</label><input type="time" id="centerTime"></div>
            <div><label>Uyruk</label><select id="centerNation"></select></div>
          </div>
          <br>
          <div class="grid grid4">
            <div><label>Yetişkin</label><input type="number" id="centerAdult" value="2" min="0"></div>
            <div><label>Çocuk</label><input type="number" id="centerChild" value="0" min="0"></div>
            <div><label>Kart</label><input id="centerKart" placeholder="Kart türü"></div>
            <div>
              <label>Plaka</label>
              <select id="centerPlaka">
                <option value="">Plaka seçin</option>
              </select>
            </div>
          </div>
          <br>
          <label>Not</label>
          <textarea id="centerNotes" placeholder="Özel istekler..."></textarea>
          <br><br>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn-gold" onclick="saveCenterReservation()">💾 KAYDET</button>
            <button class="btn-dark" onclick="clearManualForm()">🗑 Temizle</button>
          </div>
        </div>
      </section>

      <!-- RAPORLAR -->
      <section id="raporSection" class="section">
        <div class="panel-card">
          <div class="top-bar">
            <h2>📊 Raporlar</h2>
            <div style="display:flex;gap:5px;flex-wrap:wrap">
              <button class="btn-dark btn-sm" onclick="setRaporRange('today')">Bugün</button>
              <button class="btn-dark btn-sm" onclick="setRaporRange('week')">Hafta</button>
              <button class="btn-dark btn-sm" onclick="setRaporRange('month')">Ay</button>
              <input type="date" id="rStart" style="width:130px">
              <span style="color:var(--text2);align-self:center">—</span>
              <input type="date" id="rEnd" style="width:130px">
              <button class="btn-gold btn-sm" onclick="loadRapor()">Uygula</button>
            </div>
          </div>
          <div id="raporContent" style="margin-top:12px"></div>
        </div>
      </section>

      <!-- PERSONELLER -->
      <section id="staffSection" class="section">
        <div class="panel-card">
          <div class="top-bar"><h2>👥 Personel Yönetimi</h2></div>
          <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
            <input id="staffNameInput" placeholder="Personel tam adı" style="flex:1;min-width:160px">
            <select id="staffGrupInput" style="width:110px">
              <option value="">Grup Yok</option>
              <option value="GRUP1">GRUP1</option>
              <option value="GRUP2">GRUP2</option>
            </select>
            <button class="btn-gold" onclick="addStaffUI()">+ Ekle</button>
            <input type="file" id="staffImportFile" accept=".xlsx,.xls,.csv" style="display:none" onchange="importStaffExcel(event)">
            <button class="btn-dark" onclick="document.getElementById('staffImportFile').click()">📥 Excelden Personel İçe Aktar</button>
            <button class="btn-dark" onclick="downloadStaffTemplate()">⬇ Personel Şablonu</button>
          </div>
          <div id="allStaffList"></div>
        </div>
      </section>

      <!-- İZİN GİRİŞİ -->
      <section id="offSection" class="section">
        <div class="panel-card">
          <div class="top-bar"><h2>🏖 İzin Girişi</h2></div>
          <div class="grid grid3">
            <div><label>İzin Tarihi</label><input type="date" id="offDate"></div>
            <div><label>Personel</label><select id="offStaffSelect" style="width:100%"></select></div>
            <div style="align-self:flex-end;display:flex;gap:6px">
              <button class="btn-gold" onclick="makeOff(true)"  style="flex:1">✅ İzinli Yap</button>
              <button class="btn-dark" onclick="makeOff(false)" style="flex:1">✗ Kaldır</button>
            </div>
          </div>
          <div id="offFeedback" style="margin-top:10px"></div>
          <hr class="divider">
          <div style="font-size:11px;color:var(--text2);margin-bottom:7px">
            <b id="offDateLabel" style="color:var(--gold2)"></b> tarihinde izinli personel:
          </div>
          <div id="offCurrentList" class="staff-list"></div>
        </div>
      </section>

      <!-- ARAÇLAR -->
      <section id="plakaSection" class="section">
        <div class="panel-card">
          <div class="top-bar"><h2>🚗 Araç Yönetimi</h2></div>
          <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
            <input id="plakaGir" placeholder="Plaka (örn: 07ABC123)" style="flex:1;min-width:140px">
            <input id="modelGir" placeholder="Marka/Model (örn: Ford Transit)" style="flex:1;min-width:140px">
            <button class="btn-gold" onclick="addPlakaUI()">+ Ekle</button>
          </div>
          <div id="plakaList"></div>
        </div>
      </section>

    </main>

    <!-- Sağ Panel -->
    <aside style="min-width:0;">
      <div class="panel-card">
        <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px">
          Personel · <b id="selectedDateLabel" style="color:var(--gold)"></b>
        </div>
        <div style="margin-bottom:9px">
          <div style="font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">Boşta <span id="freeCount" style="color:var(--gold2)"></span></div>
          <div id="freeStaffList" class="staff-list"></div>
        </div>
        <div style="margin-bottom:9px">
          <div style="font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">Programda <span id="busyCount" style="color:var(--gold2)"></span></div>
          <div id="busyStaffList" class="staff-list"></div>
        </div>
        <div>
          <div style="font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">İzinli <span id="offCount" style="color:var(--gold2)"></span></div>
          <div id="offStaffList" class="staff-list"></div>
        </div>
      </div>
      <div class="panel-card">
        <div style="font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px">Günlük Özet</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
          <div style="text-align:center"><div id="sumTotal" style="font-size:20px;font-weight:900;color:var(--gold2)">—</div><div style="font-size:9px;color:var(--text2)">REZERVASYON</div></div>
          <div style="text-align:center"><div id="sumPax"   style="font-size:20px;font-weight:900;color:var(--gold2)">—</div><div style="font-size:9px;color:var(--text2)">PAX</div></div>
          <div style="text-align:center"><div id="sumIn"    style="font-size:20px;font-weight:900;color:#fde68a">—</div><div style="font-size:9px;color:var(--text2)">İÇERİDE</div></div>
          <div style="text-align:center"><div id="sumOut"   style="font-size:20px;font-weight:900;color:#bbf7d0">—</div><div style="font-size:9px;color:var(--text2)">TAMAMLANDI</div></div>
        </div>
      </div>
    </aside>

  </div>
</div>

<!-- Personel Düzenleme Modalı -->
<div id="staffEditModal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h3>✏️ Personel Düzenle</h3>
    <input type="hidden" id="editStaffId">
    <div style="margin-bottom:11px"><label>Ad Soyad</label><input id="editStaffName"></div>
    <div style="margin-bottom:11px">
      <label>Grup</label>
      <select id="editStaffGrup">
        <option value="">Grup Yok</option>
        <option value="GRUP1">GRUP1</option>
        <option value="GRUP2">GRUP2</option>
      </select>
    </div>
    <div style="margin-bottom:16px">
      <label>Durum</label>
      <select id="editStaffStatus">
        <option value="ACTIVE">AKTİF</option>
        <option value="INACTIVE">PASİF</option>
      </select>
    </div>
    <div style="display:flex;gap:7px">
      <button class="btn-gold" style="flex:1" onclick="saveStaffEdit()">💾 Kaydet</button>
      <button class="btn-dark" onclick="closeStaffModal()">İptal</button>
    </div>
  </div>
</div>

<script src="../config/config.js?v=20260515-admin-excel-hotel-lock-notif-fix"></script>
<script src="../config/firebase.js?v=20260515-admin-excel-hotel-lock-notif-fix"></script>
<script src="../assets/common.js?v=20260515-admin-excel-hotel-lock-notif-fix"></script>
<script src="../assets/firebase-api.js?v=20260515-admin-excel-hotel-lock-notif-fix"></script>
<script>
showApiWarning();

let reservations = [], staff = [], hotels = [], plakalar = [];
let savedInputs = {}; // Satır değerlerini hafızada sakla
let activeHotelFilter = ""; // Otel filtresi

function populateHotelFilter() {
  const sel = document.getElementById("hotelFilterSel");
  if (!sel) return;
  const hotelNames = [...new Set(reservations
    .filter(r => r.hotel)
    .map(r => r.hotel)
  )].sort((a,b) => a.localeCompare(b,"tr"));
  sel.innerHTML = '<option value="">— Tüm Oteller —</option>' +
    hotelNames.map(h => `<option value="${h}"${h===activeHotelFilter?" selected":""}>${h}</option>`).join("");
}

function applyHotelFilter() {
  const sel = document.getElementById("hotelFilterSel");
  activeHotelFilter = sel ? sel.value : "";
  renderReservations();
}

function saveInputValues() {
  savedInputs = {};
  document.querySelectorAll('tr[data-id]').forEach(row => {
    const id = row.dataset.id;
    if (!id) return;
    savedInputs[id] = {
      kart:    document.getElementById('kart_'  + id)?.value || '',
      plaka:   document.getElementById('plaka_' + id)?.value || '',
      csaat:   document.getElementById('csaat_' + id)?.value || '',
      s1:      document.getElementById('s1_'    + id)?.value || '',
      s2:      document.getElementById('s2_'    + id)?.value || '',
      s3:      document.getElementById('s3_'    + id)?.value || '',
      s4:      document.getElementById('s4_'    + id)?.value || '',
      satis:   document.getElementById('satis_' + id)?.checked || false,
    };
  });
}

function restoreInputValues() {
  Object.entries(savedInputs).forEach(([id, vals]) => {
    const setVal = (elId, val) => {
      const el = document.getElementById(elId);
      if (el && val !== undefined && val !== '') el.value = val;
    };
    const setChk = (elId, val) => {
      const el = document.getElementById(elId);
      if (el) el.checked = val;
    };
    setVal('kart_'  + id, vals.kart);
    setVal('csaat_' + id, vals.csaat);
    setChk('satis_' + id, vals.satis);
    // Plaka ve tezgahtarlar için select
    ['plaka_','s1_','s2_','s3_','s4_'].forEach((prefix, i) => {
      const key = ['plaka','s1','s2','s3','s4'][i];
      const el = document.getElementById(prefix + id);
      if (el && vals[key]) {
        // Option varsa seç
        const opt = Array.from(el.options).find(o => o.value === vals[key]);
        if (opt) el.value = vals[key];
      }
    });
  });
}
const today = todayStr();
datePicker.value  = today;
centerDate.value  = today;
centerTime.value  = "10:30";
offDate.value     = today;
rStart.value      = today;
rEnd.value        = today;

centerNation.innerHTML = nationOptions("RUS");

function updateDateDisplay() {
  dateDisplay.innerText = fmtDate(datePicker.value);
  selectedDateLabel.innerText = fmtDate(datePicker.value);
  offDateLabel.innerText = fmtDate(offDate.value || datePicker.value);
}
updateDateDisplay();
datePicker.addEventListener("change", updateDateDisplay);
offDate.addEventListener("change", () => {
  offDateLabel.innerText = fmtDate(offDate.value);
  renderOffCurrent(offDate.value);
});

// ── Sekme ──────────────────────────────────────────────────────
function showSection(id, btnId) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".side-menu button").forEach(b => b.classList.remove("active-menu"));
  if (btnId) document.getElementById(btnId).classList.add("active-menu");
}

// ── Veri Yükleme ──────────────────────────────────────────────
async function loadAll() {
  updateDateDisplay();
  const [rRes, sRes, hRes, pRes] = await Promise.allSettled([
    getReservations(datePicker.value),
    getStaffWithOffDates(),
    getHotels(),
    getPlakalar()
  ]);
  reservations = rRes.status==='fulfilled' && Array.isArray(rRes.value) ? rRes.value : [];
  staff        = sRes.status==='fulfilled' && Array.isArray(sRes.value) ? sRes.value : [];
  hotels       = hRes.status==='fulfilled' && Array.isArray(hRes.value) ? hRes.value : [];
  plakalar     = pRes.status==='fulfilled' && Array.isArray(pRes.value) ? pRes.value : [];
  checkNewReservations(reservations);
  renderHotelDatalist();
  updatePlakaSelects();
  renderPlakaList();
  saveInputValues();
  renderReservations();
  restoreInputValues();
  renderStaffPanel();
  renderSummary();
  renderOffCurrent(offDate.value || datePicker.value);
}

function renderHotelDatalist() {
  hotelListEl.innerHTML = hotels.map(h => `<option value="${h.hotel}"></option>`).join("");
}

// ── Personel yardımcıları ──────────────────────────────────────
function isOff(s, date) {
  const d = date || datePicker.value;
  return String(s.offDates || "").split(",").map(x => x.trim()).filter(Boolean).includes(d);
}

function busySet() {
  const u = new Set();
  reservations.forEach(r => {
    if (r.status === "CANCELLED") return;
    if (String(r.cikti).toUpperCase() === "TRUE") return;
    [r.staff1,r.staff2,r.staff3,r.staff4].filter(Boolean).forEach(x => u.add(x));
  });
  return u;
}

function freeStaff()  { const b=busySet(); return staff.filter(s => s.status==="ACTIVE"&&!isOff(s)&&!b.has(s.name)); }
function busyStaff2() { const b=busySet(); return staff.filter(s => b.has(s.name)); }
function offStaff(d)  { return staff.filter(s => isOff(s, d)); }

// Plaka dropdown seçenekleri
function plakaOpts(current = "") {
  const opts = ['<option value="">—</option>'];
  plakalar.filter(p => p.status === "ACTIVE" || p.plaka === current).forEach(p => {
    opts.push(`<option value="${p.plaka}"${p.plaka===current?" selected":""}>${p.plaka}${p.model?" ("+p.model+")":""}</option>`);
  });
  return opts.join("");
}

// Plaka form dropdown güncelle
function updatePlakaSelects() {
  const sel = document.getElementById("centerPlaka");
  if (sel) sel.innerHTML = '<option value="">Plaka seçin</option>' +
    plakalar.filter(p=>p.status==="ACTIVE").map(p=>`<option value="${p.plaka}">${p.plaka}${p.model?" ("+p.model+")":""}</option>`).join("");
}

// Araç listesi render
function renderPlakaList() {
  const el = document.getElementById("plakaList");
  if (!el) return;
  el.innerHTML = plakalar.map(p => `
    <div class="panel-card" style="padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <b style="flex:1">${p.plaka}</b>
      <span style="color:var(--text2);font-size:12px">${p.model||""}</span>
      <span class="badge ${p.status==="ACTIVE"?"exited":"cancelled"}">${p.status==="ACTIVE"?"AKTİF":"PASİF"}</span>
      <button class="btn-red btn-sm" onclick="deletePlakaUI('${p.id}')">Sil</button>
    </div>`).join("") || '<div style="color:var(--text2)">Araç yok.</div>';
}

// Araç ekle
async function addPlakaUI() {
  const plaka = document.getElementById("plakaGir")?.value.trim().toUpperCase();
  const model = document.getElementById("modelGir")?.value.trim();
  if (!plaka) return showToast("Plaka yazın","err");
  await window._fbAPI.addPlaka(plaka, model);
  const r = { success: true };
  if (r.success) {
    document.getElementById("plakaGir").value = "";
    document.getElementById("modelGir").value = "";
    showToast("✅ " + plaka + " eklendi");
    await loadAll();
  } else showToast("❌ Hata","err");
}

async function deletePlakaUI(id) {
  if (!confirm("Araç silinsin mi?")) return;
  await window._fbAPI.deletePlaka(id);
  showToast("Araç silindi");
  await loadAll();
}

// Dropdown seçenekleri — merkez ekranda İLK İSİM görünür
function staffOpts(current = "") {
  const opts = ['<option value="">Boş</option>'];
  const free = freeStaff().map(s => s.name);
  if (current && !free.includes(current)) free.unshift(current);
  free.forEach(n => opts.push(`<option value="${n}"${n===current?" selected":""}>${firstName(n)}</option>`));
  return opts.join("");
}

function sortByGrupName(arr) {
  // Grup1 önce, Grup2 sonra; her grup içinde isme göre sırala
  return [...arr].sort((a, b) => {
    const ga = a.grup || "ZZZ", gb2 = b.grup || "ZZZ";
    if (ga !== gb2) return ga.localeCompare(gb2);
    return a.name.localeCompare(b.name, "tr");
  });
}

function renderStaffPanel() {
  const f=freeStaff(), b=busyStaff2(), o=offStaff(datePicker.value);
  freeCount.innerText=`(${f.length})`; busyCount.innerText=`(${b.length})`; offCount.innerText=`(${o.length})`;

  function grupPills(arr, cls) {
    if (!arr.length) return '<span style="color:var(--text2);font-size:11px">—</span>';
    const sorted = sortByGrupName(arr);
    // Gruplara ayır
    const g1 = sorted.filter(s => (s.grup||"") === "GRUP1");
    const g2 = sorted.filter(s => (s.grup||"") === "GRUP2");
    const noG = sorted.filter(s => !s.grup);

    // Her grup bir sütun: yan yana, isimler alt alta
    const col = (list) => list.length
      ? `<div style="display:flex;flex-direction:column;gap:4px">${list.map(s=>`<span class="staff-pill ${cls}">${firstName(s.name)}</span>`).join("")}</div>`
      : "";

    const cols = [col(g1), col(g2), col(noG)].filter(Boolean);
    if (!cols.length) return '<span style="color:var(--text2);font-size:11px">—</span>';
    return `<div style="display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap">${cols.join("")}</div>`;
  }

  freeStaffList.innerHTML = grupPills(f, "staff-free");
  busyStaffList.innerHTML = grupPills(b, "staff-busy");
  offStaffList.innerHTML  = grupPills(o, "staff-off");

  // Personel yönetim listesi
  allStaffList.innerHTML = staff.map(s => {
    const gb = s.grup ? `<span class="${s.grup==='GRUP1'?'grup1':'grup2'}">${s.grup}</span>` : "";
    const aktif = s.status === "ACTIVE";
    return `
      <div class="panel-card" style="padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <b style="flex:1">${s.name}</b>
        ${gb}
        <span class="badge ${aktif?'exited':'cancelled'}">${aktif?"AKTİF":"PASİF"}</span>
        <button class="btn-blue btn-sm" onclick='openStaffModal(${JSON.stringify(s).replace(/"/g,"&quot;")})'>✏️ Düzelt</button>
        <button class="btn-red  btn-sm" onclick="deleteStaffUI('${s.id || s._key}')">Sil</button>
      </div>`;
  }).join("") || '<div style="color:var(--text2)">Personel yok.</div>';

  // İzin dropdown
  offStaffSelect.innerHTML = staff.map(s => `<option value="${s.id}">${s.name}</option>`).join("");
}

function rowClass(r) {
  if (r.status === "CANCELLED") return "row-cancel";
  if (String(r.cikti).toUpperCase() === "TRUE") return "row-cikti";
  if (String(r.girdi).toUpperCase() === "TRUE")  return "row-girdi";
  return "";
}

function badge(r) {
  if (r.status==="CANCELLED") return '<span class="badge cancelled">İPTAL</span>';
  if (String(r.cikti).toUpperCase()==="TRUE") return '<span class="badge exited">ÇIKTI</span>';
  if (String(r.girdi).toUpperCase()==="TRUE")  return '<span class="badge entered">GİRDİ</span>';
  if (r.status==="UPDATED") return '<span class="badge updated">GÜNCELLENDİ</span>';
  return '<span class="badge pending">BEKLİYOR</span>';
}

function saveRowValues() {
  const saved = {};
  reservations.forEach(r => {
    const id = r.id;
    const get = (el) => document.getElementById(el+id)?.value || "";
    saved[id] = {
      kart:  get("kart_"),
      plaka: document.getElementById("plaka_"+id)?.value || "",
      s1:    document.getElementById("s1_"+id)?.value || "",
      s2:    document.getElementById("s2_"+id)?.value || "",
      s3:    document.getElementById("s3_"+id)?.value || "",
      s4:    document.getElementById("s4_"+id)?.value || "",
      csaat: get("csaat_"),
      satis: document.getElementById("satis_"+id)?.checked || false,
    };
  });
  return saved;
}

function restoreRowValues(saved) {
  if (!saved) return;
  Object.entries(saved).forEach(([id, v]) => {
    const set = (elId, val) => { const el = document.getElementById(elId+id); if (el && val) el.value = val; };
    set("kart_",  v.kart);
    set("csaat_", v.csaat);
    if (v.plaka) { const el = document.getElementById("plaka_"+id); if (el) el.value = v.plaka; }
    if (v.s1) { const el = document.getElementById("s1_"+id); if (el) el.value = v.s1; }
    if (v.s2) { const el = document.getElementById("s2_"+id); if (el) el.value = v.s2; }
    if (v.s3) { const el = document.getElementById("s3_"+id); if (el) el.value = v.s3; }
    if (v.s4) { const el = document.getElementById("s4_"+id); if (el) el.value = v.s4; }
    const satis = document.getElementById("satis_"+id);
    if (satis) satis.checked = v.satis;
  });
}

async function updateGirdi(id, checked) {
  await updateReservation(id, { girdi:checked?"TRUE":"", status:checked?"IN_STORE":"PENDING" });
  // Sadece lokal state güncelle, tablo yeniden çekilmesin
  const r = reservations.find(x => String(x.id) === String(id));
  if (r) {
    r.girdi  = checked ? "TRUE" : "";
    r.status = checked ? "IN_STORE" : "PENDING";
  }
  renderReservations();
  renderSummary();
  renderStaffPanel();
}

async function updateCikti(id, checked) {
  const csaat = document.getElementById("csaat_"+id)?.value || "";
  const now   = checked ? (csaat || new Date().toTimeString().slice(0,5)) : "";
  if (checked && document.getElementById("csaat_"+id)) document.getElementById("csaat_"+id).value = now;
  await updateReservation(id, { cikti:checked?"TRUE":"", ciktiSaati:now, status:checked?"EXITED":"IN_STORE" });
  // Sadece lokal state güncelle
  const r = reservations.find(x => String(x.id) === String(id));
  if (r) {
    r.cikti      = checked ? "TRUE" : "";
    r.ciktiSaati = now;
    r.status     = checked ? "EXITED" : "IN_STORE";
  }
  renderReservations();
  renderSummary();
  renderStaffPanel();
}

async function saveOps(id) {
  const st = ["s1_","s2_","s3_","s4_"].map(p => document.getElementById(p+id)?.value||"").filter(Boolean);
  if (new Set(st).size !== st.length) return showToast("Aynı tezgahtar birden fazla seçilemez","err");
  const satis = document.getElementById("satis_"+id)?.checked ? "TRUE" : "";
  await updateReservation(id, {
    kart:       document.getElementById("kart_"+id)?.value||"",
    ayak:       document.getElementById("plaka_"+id)?.value||"",
    ciktiSaati: document.getElementById("csaat_"+id)?.value||"",
    satis,
    staff1:     document.getElementById("s1_"+id)?.value||"",
    staff2:     document.getElementById("s2_"+id)?.value||"",
    staff3:     document.getElementById("s3_"+id)?.value||"",
    staff4:     document.getElementById("s4_"+id)?.value||"",
    status:     "UPDATED"
  });
  showToast("✅ Kaydedildi");
  await loadAll();
}

async function saveCenterReservation() {

    return showToast("Otel, tarih ve saat zorunlu","err");

    date:centerDate.value, time:centerTime.value, hotel:centerHotel.value,
    adult:centerAdult.value, child:centerChild.value,
    nation:centerNation.value, notes:centerNotes.value,

  };

  let r;

    await updateReservation(editResId.value, body);
    r = { success: true };

    const newId = await addReservation(body);

  } else {
    showToast("❌ " + (r.message||"Hata"),"err");

function rowVal(row, names) {
  for (const n of names) {
    if (row[n] !== undefined && row[n] !== null && String(row[n]).trim() !== "") return String(row[n]).trim();
  }
  return "";
}

async function importStaffExcel(event) {
  const file = event.target.files && event.target.files[0];
  event.target.value = "";
  if (!file) return;
  if (typeof XLSX === "undefined") return showToast("Excel okuyucu yüklenemedi", "err");
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type:"array" });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { defval:"" });
  if (!rows.length) return showToast("Excel boş", "err");
  let added = 0, skipped = 0;
  for (const row of rows) {
    const name = rowVal(row, ["Ad Soyad","AD SOYAD","Personel","PERSONEL","name"]);
    const grup = rowVal(row, ["Grup","GRUP","grup"]);
    const status = rowVal(row, ["Durum","DURUM","status"]) || "ACTIVE";
    if (!name) { skipped++; continue; }
    await window._fbAPI.addStaff({ name, grup, status: status.toUpperCase() });
    added++;
  }
  showToast(`✅ ${added} personel aktarıldı${skipped ? `, ${skipped} satır atlandı` : ""}`);
  await loadAll();
}

function downloadStaffTemplate() {
  const headers = ["Ad Soyad","Grup","Durum"];
  const rows = [["Ali Veli","GRUP1","ACTIVE"]];
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Personel");
  XLSX.writeFile(wb, "personel-aktarim-sablonu.xlsx");
}

async function calcStatsFromFirebase(startDate, endDate) {
  const all = await getReservations();
  const filtered = all.filter(r => (!startDate||r.date>=startDate)&&(!endDate||r.date<=endDate));
  let totalRes=0,totalPax=0;
  const byStatus={},byNation={},byHotel={},byDay={},byHour={};
  filtered.forEach(r=>{
    totalRes++;totalPax+=(Number(r.adult)||0)+(Number(r.child)||0);
    byStatus[r.status||"PENDING"]=(byStatus[r.status||"PENDING"]||0)+1;
    byNation[r.nation||"Diger"]=(byNation[r.nation||"Diger"]||0)+1;
    byHotel[r.hotel||""]=(byHotel[r.hotel||""]||0)+1;
    byDay[r.date||""]=(byDay[r.date||""]||0)+1;
    byHour[String(r.time||"").slice(0,2)||"??"]=(byHour[String(r.time||"").slice(0,2)||"??"]||0)+1;
  });
  return {success:true,totalRes,totalPax,byStatus,byNation,byHotel,byDay,byHour};
}

async function calcPerfFromFirebase(startDate, endDate) {
  const all = await getReservations();
  const filtered = all.filter(r=>(!startDate||r.date>=startDate)&&(!endDate||r.date<=endDate)&&r.status!=="CANCELLED");
  const perf={};
  filtered.forEach(r=>{
    const pax=(Number(r.adult)||0)+(Number(r.child)||0);
    [r.staff1,r.staff2,r.staff3,r.staff4].filter(Boolean).forEach(n=>{
      if(!perf[n])perf[n]={count:0,pax:0};
      perf[n].count++;perf[n].pax+=pax;
    });
  });
  return Object.entries(perf).map(([name,v])=>({name,count:v.count,pax:v.pax})).sort((a,b)=>b.count-a.count);
}

let raporData=null, raporPerf=null;

function setRaporRange(range) {
  const t=todayStr();
  if(range==="today"){ rStart.value=t; rEnd.value=t; }
  else if(range==="week"){  rStart.value=weekStart(t); rEnd.value=t; }
  else if(range==="month"){ rStart.value=monthStart(t); rEnd.value=t; }
  loadRapor();
}

async function loadRapor() {
  if(!checkApiConfig())return;
  const s=rStart.value||todayStr(), e=rEnd.value||todayStr();
  raporContent.innerHTML='<div style="color:var(--text2);text-align:center;padding:18px">Yükleniyor...</div>';
  [raporData,raporPerf]=await Promise.all([
    calcStatsFromFirebase(s,e),
    calcPerfFromFirebase(s,e)
  ]);
  if(!raporData?.success){raporContent.innerHTML='<div class="notice">Veri alınamadı.</div>';return;}
  renderRapor(s,e);
}

    <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
    <span class="bar-value">${val}</span>

}

function renderRapor(s,e){
  const d=raporData;
  const nEnt=Object.entries(d.byNation||{}).sort((a,b)=>b[1]-a[1]);
  const hEnt=Object.entries(d.byHotel||{}).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const dEnt=Object.entries(d.byDay||{}).sort((a,b)=>a[0].localeCompare(b[0]));
  const sEnt=Object.entries(d.byStatus||{}).sort((a,b)=>b[1]-a[1]);
  const hrEnt=Object.entries(d.byHour||{}).sort((a,b)=>a[0].localeCompare(b[0]));
  const mxN=Math.max(...nEnt.map(x=>x[1]),1);
  const mxH=Math.max(...hEnt.map(x=>x[1]),1);
  const mxD=Math.max(...dEnt.map(x=>x[1]),1);
  const mxHr=Math.max(...hrEnt.map(x=>x[1]),1);
  const mxP=raporPerf?.length?raporPerf[0].count:1;

  raporContent.innerHTML=`
    <div class="stat-cards">
      <div class="stat-card"><div class="s-val">${d.totalRes}</div><div class="s-lbl">Rezervasyon</div></div>
      <div class="stat-card"><div class="s-val">${d.totalPax}</div><div class="s-lbl">Toplam PAX</div></div>
      <div class="stat-card"><div class="s-val" style="font-size:16px">${Object.entries(d.byHotel||{}).sort((a,b)=>b[1]-a[1])[0]?.[0]||"—"}</div><div class="s-lbl">En Yoğun Otel</div></div>
      <div class="stat-card"><div class="s-val">${Object.entries(d.byHour||{}).sort((a,b)=>b[1]-a[1])[0]?.[0]||"—"}:xx</div><div class="s-lbl">En Kalabalık Saat</div></div>
    </div>
    <div class="panel-card" style="margin-bottom:11px">
      <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px">Durum</div>
      <div style="display:flex;flex-wrap:wrap;gap:7px">
        ${sEnt.map(([st,n])=>`<span class="badge pending" style="font-size:11px">${statusLabel(st)}: ${n}</span>`).join("")}
      </div>
    </div>
    <div class="grid grid3" style="gap:11px;margin-bottom:11px">
      <div class="panel-card">
        <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">🌍 Uyruk</div>
        <div class="bar-chart">${nEnt.map(([l,v])=>barRow(l,v,mxN)).join("")}</div>
      </div>
      <div class="panel-card">
        <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">🏨 Otel Yoğunluğu (Karşılaştırmalı)</div>
        <div class="bar-chart">${hEnt.map(([l,v])=>barRow(l,v,mxH,"blue")).join("")}</div>
      </div>
      <div class="panel-card">
        <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">⏰ Saat Dağılımı</div>
        <div class="bar-chart">${hrEnt.map(([l,v])=>barRow(l+":xx",v,mxHr,"green")).join("")}</div>
      </div>
    </div>
    ${dEnt.length>1?`
    <div class="panel-card" style="margin-bottom:11px">
      <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">📅 Günlük Trend — ${fmtDate(s)} / ${fmtDate(e)}</div>
      <div class="bar-chart">${dEnt.map(([l,v])=>barRow(fmtDate(l),v,mxD,"blue")).join("")}</div>
    </div>`:""}
    <div class="panel-card">
      <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">🏆 Personel Performansı (Tam İsim)</div>
      ${!raporPerf?.length
        ?'<div style="color:var(--text2);text-align:center;padding:14px">Bu dönemde atama yok.</div>'
        :raporPerf.map((p,i)=>`
          <div class="perf-row">
            <div class="perf-rank ${i===0?"rank-1":i===1?"rank-2":i===2?"rank-3":"rank-n"}">${i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</div>
            <div class="perf-name">${p.name}</div>
            <div class="perf-meta">${p.count} seans · ${p.pax} pax</div>
            <div class="perf-bar-wrap"><div class="bar-track"><div class="bar-fill" style="width:${Math.round(p.count/mxP*100)}%"></div></div></div>
          </div>`).join("")
      }
    </div>`;
}

// ── Dışa Aktar ─────────────────────────────────────────────────
// Son export zamanını localStorage'da sakla
function getLastExportTime() {
  return localStorage.getItem("lastExportTime_" + datePicker.value) || null;
}
function setLastExportTime() {
  localStorage.setItem("lastExportTime_" + datePicker.value, new Date().toISOString());
}

function exportXLS(mode = "all") {
  const acentaMap = {};
  hotels.forEach(h => { acentaMap[h.hotel] = h.acentaCode||""; });

  let list = reservations;

  if (mode === "new") {
    // İptal olanları çıkar
    list = list.filter(r => r.status !== "CANCELLED");

    // Son exporttan sonra eklenenleri al
    const lastTime = getLastExportTime();
    if (lastTime) {
      const lastMs = new Date(lastTime).getTime();
      const newOnes = list.filter(r => {
        const createdMs = r.createdAt ? new Date(r.createdAt).getTime() : 0;
        return createdMs > lastMs;
      });
      if (!newOnes.length) {
        showToast("Son exporttan bu yana yeni rezervasyon yok", "err");
        return;
      }
      list = newOnes;
      showToast(`✅ ${list.length} yeni kayıt aktarılıyor`);
    } else {
      // İlk "Yeni" export — o günün iptal olmayanlarının tamamı
      showToast(`✅ ${list.length} kayıt aktarılıyor (ilk export)`);
    }
  } else {
    if (!list.length) return showToast("Aktarılacak rezervasyon yok","err");
  }

  const headers = [
    "ACENTAKOD","TARIH","ACENTAADI","GRUPBASKANADI",
    "KARTNO","UYRUK",
    "SERVISCIADI","SERVISCIADI2","SERVISCIADI3","SERVISCIADI4",
    "PAX","PAXCOCUK","GIRIS","CIKIS","AYAK",
    "SUBEKOD","SUBEADI"
  ];

  const rows = list.map(r => [
    acentaMap[r.hotel] || "",
    fmtDateDot(r.date),
    r.hotel,
    "PIANO REHBER",
    r.kart||"",
    r.nation,
    r.staff1||"", r.staff2||"", r.staff3||"", r.staff4||"",
    Number(r.adult)||0,
    Number(r.child)||0,
    r.time,
    r.ciktiSaati || "",
    "1.AYAK",                  // her zaman sabit
    "1",
    "MERKEZ"
  ]);

  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  ws["!cols"] = [20,14,24,14,10,12,16,16,16,16,6,8,8,8,10,8,10].map(w=>({wch:w}));

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "sayfa1");
  const tarih = fmtDateDot(datePicker.value).replace(/\./g,"-");
  const suffix = mode === "new" ? "-yeni" : "";
  XLSX.writeFile(wb, `piano-deri-${tarih}${suffix}.xls`, { bookType:"xls" });

  // "Yeni" exportta zamanı güncelle
  if (mode === "new") setLastExportTime();
  showToast(`✅ Excel indirildi (${reservations.length} kayıt)`);
}

// ── Yeni Rezervasyon Bildirim Sistemi ──────────────────────────
let knownIds   = new Set();
let blinkIds   = new Set();
let firstLoad  = true;
let notifCtx   = null;
let audioArmed  = false;

function initAudio() {
  try {
    if (!notifCtx) notifCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (notifCtx.state === "suspended") notifCtx.resume();
    audioArmed = true;
  } catch(e) {}
}

function playNotifSound() {
  try {
    initAudio();
    if (!notifCtx || notifCtx.state === "suspended") return;
    [0, 0.22, 0.44].forEach((t, i) => {
      const osc  = notifCtx.createOscillator();
      const gain = notifCtx.createGain();
      osc.connect(gain); gain.connect(notifCtx.destination);
      osc.frequency.value = i === 1 ? 1046 : 880;
      osc.type = "sine";
      gain.gain.setValueAtTime(0, notifCtx.currentTime + t);
      gain.gain.linearRampToValueAtTime(0.35, notifCtx.currentTime + t + 0.04);
      gain.gain.linearRampToValueAtTime(0,    notifCtx.currentTime + t + 0.18);
      osc.start(notifCtx.currentTime + t);
      osc.stop(notifCtx.currentTime  + t + 0.22);
    });
  } catch(e) {}
}

function checkNewReservations(list) {
  if (firstLoad) {
    list.forEach(r => knownIds.add(String(r.id)));
    firstLoad = false;
    return;
  }
  const newOnes = list.filter(r => !knownIds.has(String(r.id)));
  newOnes.forEach(r => knownIds.add(String(r.id)));
  if (!newOnes.length) return;

  const stack = document.getElementById("newResNotifStack");
  newOnes
    .slice()
    .sort((a,b) => String(a.time || "").localeCompare(String(b.time || "")))
    .forEach(r => {
      const toast = document.createElement("div");
      toast.className = "new-res-toast";
      toast.dataset.id = String(r.id);
      toast.onclick = goToNewRes;
      toast.innerHTML = `
        <span class="nr-close" onclick="event.stopPropagation();this.closest('.new-res-toast').remove();">✕</span>
        <div class="nr-title">🔔 Yeni Rezervasyon!</div>
        <div class="nr-list">🏨 <b>${r.hotel}</b> — ${r.time} — ${(Number(r.adult)||0)+(Number(r.child)||0)} kişi</div>
        <div style="font-size:10px;color:#6ee7a0;margin-top:6px;opacity:.7">Tıklayarak görüntüleyin →</div>`;
      // appendChild: yeni bildirim alta gelir, stack yüksekliği yukarı doğru büyür
      stack.appendChild(toast);
    });

  // Ses çal
  playNotifSound();

  // Yeni ID'leri blink listesine ekle — renderReservations halleder
  newOnes.forEach(r => blinkIds.add(String(r.id)));

}

function closeNotif() {
  const stack = document.getElementById("newResNotifStack");
  if (stack) stack.innerHTML = "";
  blinkIds.clear();
  // Blink class'larını kaldır
  document.querySelectorAll('.row-new-blink').forEach(row => {
    row.classList.remove('row-new-blink');
  });
}

function goToNewRes() {
  closeNotif();
  showSection("homeSection","mnHome");
  setTimeout(() => window.scrollTo({ top: 0, behavior:"smooth" }), 200);
}

function stopNewReservationAlert() {
  const stack = document.getElementById("newResNotifStack");
  if (stack && stack.children.length) closeNotif();
}

// Kullanıcı ekrana dokunduğunda / mouse ile tıkladığında bildirim ve yanıp sönme dursun
document.addEventListener("pointerdown", stopNewReservationAlert, true);
document.addEventListener("touchstart", stopNewReservationAlert, true);

// Ses izni için kullanıcı ilk etkileşiminde başlat
["pointerdown","click","keydown","touchstart"].forEach(evt => {
  document.addEventListener(evt, initAudio, { once: true, passive: true });
});

// ── Bootstrap ──────────────────────────────────────────────────
// Firebase initialize olana kadar kısa bekle
setTimeout(() => loadAll(), 400);

// Otomatik yenileme: kullanıcı input'a dokunuyorsa DURDUR
let userActive = false;
let autoRefreshTimer = null;

function resetActivity() {
  userActive = true;
  clearTimeout(autoRefreshTimer);
  // Kullanıcı 10 saniye işlem yapmazsa userActive'i sıfırla (loadAll setInterval halleder)
  autoRefreshTimer = setTimeout(() => {
    userActive = false;
  }, 10000);
}

// Input ve select değişimlerini izle
document.addEventListener('change', resetActivity);
document.addEventListener('input',  resetActivity);
document.addEventListener('click',  e => {
  // Sadece butonlara tıklamada aktiflik say
  if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') {
    resetActivity();
  }
});

// Normal otomatik yenileme: kullanıcı aktif değilse 5 saniyede bir (sessiz)
setInterval(() => {
  if (!userActive) loadAll();
}, 5000);

// ── Plakasız Dışa Aktar ────────────────────────────────────────
function exportPlakasiz() {
  const date = document.getElementById("datePicker")?.value || todayStr();
  const plakasiz = reservations.filter(r =>
    r.status !== "CANCELLED" &&
    !String(r.ayak || "").trim()
  ).sort((a,b) => String(a.time||"").localeCompare(String(b.time||"")));

  if (!plakasiz.length) {
    showToast("Plaka girilmemiş rezervasyon bulunamadı","err");
    return;
  }

  const XLSX2 = window.XLSX;
  const wsData = [
    ["Otel Adı", "Saat", "Pax"]
  ];
  plakasiz.forEach(r => {
    wsData.push([
      r.hotel || "",
      r.time  || "",
      (Number(r.adult)||0)+(Number(r.child)||0)
    ]);
  });

  const wb = XLSX2.utils.book_new();
  const ws = XLSX2.utils.aoa_to_sheet(wsData);
  ws["!cols"] = [{wch:28},{wch:10},{wch:8}];
  // Başlık stili
  ["A1","B1","C1"].forEach(cell => {
    if (ws[cell]) ws[cell].s = { font:{bold:true}, fill:{fgColor:{rgb:"D8AA4B"}} };
  });
  XLSX2.utils.book_append_sheet(wb, ws, "Plakasız");
  XLSX2.writeFile(wb, `plakasiz_${date}.xlsx`);
  showToast("✅ Plakasız rezervasyonlar indirildi");
}
