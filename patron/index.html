<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Piano Deri — Patron</title>
  <style>
    :root{--gold:#d8aa4b;--gold2:#f1d48a;--bg:#080808;--bg2:rgba(18,19,24,.98);--bg3:rgba(28,29,38,.95);--text:#f0f0f0;--text2:#9a9a9a;--b:rgba(216,170,75,.3);--b2:rgba(255,255,255,.08)}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:14px;min-height:100vh}

    /* ── Banner ── */
    .banner{background:linear-gradient(135deg,#0a0a14 0%,#12101a 40%,#1a1200 100%);border-bottom:1px solid var(--b);padding:22px 16px 18px;text-align:center;position:relative;overflow:hidden}
    .banner::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(216,170,75,.18) 0%,transparent 70%);pointer-events:none}
    .banner-logo{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:10px}
    .banner-p{font-family:Georgia,serif;font-size:52px;color:var(--gold2);line-height:1;text-shadow:0 0 30px rgba(216,170,75,.5)}
    .banner-title{text-align:left}
    .banner-name{font-family:Georgia,serif;font-size:18px;letter-spacing:4px;color:var(--text)}
    .banner-sub{font-size:10px;letter-spacing:3px;color:var(--gold);margin-top:3px}
    .banner-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:10px auto 0}
    .banner-tagline{font-size:11px;color:var(--text2);letter-spacing:1px;margin-top:8px}

    /* ── Header / Nav ── */
    .hdr{background:var(--bg2);border-bottom:1px solid var(--b);padding:10px 14px;position:sticky;top:0;z-index:100;backdrop-filter:blur(14px)}
    .hdr-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .rbtn{background:rgba(216,170,75,.12);border:1px solid var(--b);color:var(--gold2);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;flex-shrink:0}
    .rbtn.spin{animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .darr{background:rgba(255,255,255,.06);border:1px solid var(--b2);color:var(--text2);border-radius:7px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0}
    .darr:active{background:rgba(255,255,255,.14)}
    .dlbl{flex:1;text-align:center;cursor:pointer;min-width:0}
    .dlbl .date{font-size:14px;font-weight:700;color:var(--gold2)}
    .dlbl .day{font-size:10px;color:var(--text2);margin-top:1px}
    .tbtn{background:rgba(216,170,75,.1);border:1px solid rgba(216,170,75,.3);color:var(--gold);border-radius:7px;padding:0 10px;height:34px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
    #hd{position:absolute;opacity:0;width:0;height:0}

    /* Tab bar */
    .tab-bar{display:flex;gap:0;border-bottom:1px solid var(--b2);background:var(--bg2)}
    .tbb{flex:1;padding:9px 4px;text-align:center;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none}
    .tbb.active{color:var(--gold2);border-bottom-color:var(--gold)}

    /* ── Özet (6 kart) ── */
    .sum{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:10px 12px;background:#0d0d1a;border-bottom:1px solid var(--b2)}
    .sc{background:var(--bg3);border:1px solid var(--b2);border-radius:11px;padding:9px 4px;text-align:center}
    .sv{font-size:20px;font-weight:900;line-height:1.1;margin-bottom:2px}
    .sl{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
    .c0{color:var(--gold2)}.c1{color:#d1d5db}.c2{color:#fde68a}.c3{color:#bbf7d0}.c4{color:#f87171}.c5{color:#7dd3fc}

    .content{padding:10px 12px 80px}

    /* Otel kartı */
    .hotel-card{background:var(--bg3);border:1px solid var(--b2);border-radius:13px;overflow:hidden;margin-bottom:10px}
    .hotel-hdr{background:rgba(0,0,0,.35);padding:9px 12px;border-bottom:1px solid var(--b2);display:flex;align-items:center;gap:8px}
    .hotel-icon{font-size:14px;flex-shrink:0}
    .hotel-name{font-size:12px;font-weight:700;color:var(--gold2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .hotel-badges{display:flex;gap:4px;flex-shrink:0}
    .hb{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;border:1.5px solid}
    .hb-i{background:rgba(234,179,8,.25);border-color:rgba(234,179,8,.7);color:#fde68a}
    .hb-c{background:rgba(34,197,94,.25);border-color:rgba(34,197,94,.7);color:#4ade80}
    .hb-s{background:rgba(56,189,248,.25);border-color:rgba(56,189,248,.7);color:#7dd3fc}

    .res-row{display:flex;align-items:stretch;border-bottom:1px solid rgba(255,255,255,.04);min-height:42px}
    .res-row:last-child{border-bottom:0}
    .res-status{width:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;border-right:1px solid rgba(255,255,255,.06)}
    .rs-pending{background:rgba(31,41,55,.5);color:var(--text2)}
    .rs-inside{background:rgba(234,179,8,.2);color:#fde68a}
    .rs-done{background:rgba(34,197,94,.18);color:#4ade80}
    .rs-cancelled{background:rgba(239,68,68,.12);color:#f87171}
    .res-satis{width:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;border-right:1px solid rgba(255,255,255,.06)}
    .rs-satis-on{background:rgba(56,189,248,.2);color:#7dd3fc}
    .rs-satis-off{background:transparent;color:transparent}
    .res-info{flex:1;padding:8px 10px;display:flex;align-items:center;gap:10px}
    .res-time{font-size:14px;font-weight:900;color:var(--gold2);min-width:40px}
    .res-detail{flex:1}
    .res-pax{font-size:12px;color:var(--text);font-weight:600}
    .res-nat{font-size:10px;color:var(--text2);margin-top:1px}

    /* Rapor bölümü */
    .rapor-wrap{padding:12px}
    .rapor-filter{background:var(--bg3);border:1px solid var(--b2);border-radius:13px;padding:14px;margin-bottom:12px}
    .rapor-filter label{font-size:11px;color:var(--text2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
    .rapor-filter input,.rapor-filter select{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--b2);color:var(--text);border-radius:8px;padding:8px 10px;font-size:13px;margin-bottom:10px}
    .rapor-filter input:focus,.rapor-filter select:focus{outline:none;border-color:var(--b)}
    .rbtn-gold{background:linear-gradient(135deg,var(--gold),var(--gold3));color:#000;border:none;border-radius:10px;padding:11px 20px;font-size:13px;font-weight:800;cursor:pointer;width:100%}
    .rbtn-gold:active{opacity:.85}

    .rapor-otel-card{background:var(--bg3);border:1px solid var(--b2);border-radius:13px;overflow:hidden;margin-bottom:10px}
    .rapor-otel-hdr{background:rgba(216,170,75,.08);border-bottom:1px solid var(--b2);padding:10px 14px;display:flex;align-items:center;gap:8px}
    .rapor-otel-name{font-size:13px;font-weight:800;color:var(--gold2);flex:1}
    .rapor-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px}
    .rstat{background:rgba(0,0,0,.25);border:1px solid var(--b2);border-radius:9px;padding:8px;text-align:center}
    .rstat-val{font-size:18px;font-weight:900;color:var(--gold2);line-height:1.1}
    .rstat-lbl{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
    .rstat-satis .rstat-val{color:#7dd3fc}
    .rstat-bos .rstat-val{color:#f87171}

    .loading{display:flex;align-items:center;justify-content:center;padding:50px 20px;flex-direction:column;gap:12px;color:var(--text2)}
    .spinner{width:26px;height:26px;border:2px solid var(--b2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
    .footer{text-align:center;font-size:10px;color:var(--text2);padding:6px;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--b2)}
  </style>
</head>
<body>

<!-- BANNER -->
<div class="banner">
  <div class="banner-logo">
    <div class="banner-p">P</div>
    <div class="banner-title">
      <div class="banner-name">PIANO DERİ</div>
      <div class="banner-sub">PATRON PANELİ</div>
    </div>
  </div>
  <div class="banner-line"></div>
  <div class="banner-tagline">Günlük Operasyon Takip Sistemi</div>
</div>

<!-- HEADER / NAV -->
<div class="hdr">
  <div class="hdr-row">
    <div class="darr" onclick="changeDay(-1)">‹</div>
    <div class="dlbl" onclick="openPicker()">
      <div class="date" id="dlbl"></div>
      <div class="day" id="dwlbl"></div>
    </div>
    <div class="darr" onclick="changeDay(1)">›</div>
    <div class="tbtn" onclick="goToday()">Bugün</div>
    <div class="rbtn" id="rbtn" onclick="refresh()">↺</div>
  </div>
  <input type="date" id="hd" onchange="onPick()">
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tbb active" id="tbb-list" onclick="showTab('list')">📋 Günlük Liste</button>
  <button class="tbb" id="tbb-rapor" onclick="showTab('rapor')">📊 Rapor</button>
</div>

<!-- ÖZET (6 kart) -->
<div class="sum" id="sumBar">
  <div class="sc"><div class="sv c0" id="sv-total">—</div><div class="sl">Toplam</div></div>
  <div class="sc"><div class="sv c1" id="sv-pending">—</div><div class="sl">Bekleyen</div></div>
  <div class="sc"><div class="sv c2" id="sv-inside">—</div><div class="sl">İçeride</div></div>
  <div class="sc"><div class="sv c3" id="sv-done">—</div><div class="sl">Tamamlandı</div></div>
  <div class="sc"><div class="sv c5" id="sv-satis">—</div><div class="sl">Satış</div></div>
  <div class="sc"><div class="sv c4" id="sv-bos">—</div><div class="sl">Boş</div></div>
</div>

<!-- TAB: Günlük Liste -->
<div id="tab-list">
  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div>Yükleniyor...</div>
  </div>
</div>

<!-- TAB: Rapor -->
<div id="tab-rapor" style="display:none">
  <div class="rapor-wrap">
    <div class="rapor-filter">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <label>Başlangıç Tarihi</label>
          <input type="date" id="rStart">
        </div>
        <div>
          <label>Bitiş Tarihi</label>
          <input type="date" id="rEnd">
        </div>
      </div>
      <label>Otel (Opsiyonel)</label>
      <select id="rHotel">
        <option value="">— Tüm Oteller —</option>
      </select>
      <button class="rbtn-gold" onclick="loadRapor()">🔍 Göster</button>
    </div>
    <div id="raporContent">
      <div class="loading" style="padding:30px">
        <div style="font-size:28px;margin-bottom:8px">📊</div>
        <div>Tarih seçip "Göster" e basın</div>
      </div>
    </div>
  </div>
</div>

<div class="footer" id="footer"></div>

<script src="../config/config.js?v=20260515-patron-v2"></script>
<script src="../config/firebase.js?v=20260515-patron-v2"></script>
<script src="../assets/common.js?v=20260515-patron-v2"></script>
<script src="../assets/firebase-api.js?v=20260515-patron-v2"></script>
<script>
const DAYS=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
let curDate=todayStr(), all=[], activeTab='list';

// ── Tab Yönetimi ──────────────────────────────────────────────
function showTab(t) {
  activeTab = t;
  ['list','rapor'].forEach(id => {
    document.getElementById('tab-'+id).style.display = id===t?'block':'none';
    document.getElementById('tbb-'+id).classList.toggle('active', id===t);
  });
  document.getElementById('sumBar').style.display = t==='list' ? 'grid' : 'none';
  if (t==='rapor') initRaporHotels();
}

// ── Tarih Nav ─────────────────────────────────────────────────
function fmt(iso){if(!iso)return'';const p=iso.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function updateHdr(){const d=new Date(curDate+'T00:00:00');dlbl.innerText=fmt(curDate);dwlbl.innerText=DAYS[d.getDay()];hd.value=curDate;}
function changeDay(n){curDate=addDays(curDate,n);updateHdr();load();}
function goToday(){curDate=todayStr();updateHdr();load();}
function openPicker(){hd.click();}
function onPick(){if(hd.value){curDate=hd.value;updateHdr();load();}}

// ── Status ────────────────────────────────────────────────────
function status(r){
  if(r.status==='CANCELLED') return 'cancelled';
  if(String(r.cikti).toUpperCase()==='TRUE') return 'done';
  if(String(r.girdi).toUpperCase()==='TRUE') return 'inside';
  return 'pending';
}

// ── Özet ─────────────────────────────────────────────────────
function updateStats(){
  const active = all.filter(r=>r.status!=='CANCELLED');
  const done   = all.filter(r=>status(r)==='done');
  const satis  = done.filter(r=>String(r.satis).toUpperCase()==='TRUE');
  const bos    = done.filter(r=>String(r.satis).toUpperCase()!=='TRUE');
  sv_total.innerText   = all.length;
  sv_pending.innerText = all.filter(r=>status(r)==='pending').length;
  sv_inside.innerText  = all.filter(r=>status(r)==='inside').length;
  sv_done.innerText    = done.length;
  sv_satis.innerText   = satis.length;
  sv_bos.innerText     = bos.length;
}

// ── Render (Günlük Liste) ─────────────────────────────────────
function render(){
  const el=document.getElementById('content');
  if(!all.length){
    el.innerHTML='<div class="loading" style="padding:40px"><div style="font-size:32px;margin-bottom:10px">📭</div>Bu tarihte rezervasyon yok.</div>';
    return;
  }
  const byHotel={};
  all.forEach(r=>{if(!byHotel[r.hotel])byHotel[r.hotel]=[];byHotel[r.hotel].push(r);});
  const hotelList=Object.keys(byHotel).sort((a,b)=>a.localeCompare(b,'tr'));

  el.innerHTML=hotelList.map(hotel=>{
    const resv=byHotel[hotel].sort((a,b)=>String(a.time).localeCompare(String(b.time)));
    const hasInside=resv.some(r=>status(r)==='inside');
    const hasDone=resv.some(r=>status(r)==='done');
    const hasSatis=resv.some(r=>String(r.satis).toUpperCase()==='TRUE'&&status(r)==='done');
    const badges=`
      ${hasInside?'<div class="hb hb-i" title="İçeride">İ</div>':''}
      ${hasDone?'<div class="hb hb-c" title="Çıktı">Ç</div>':''}
      ${hasSatis?'<div class="hb hb-s" title="Satış">S</div>':''}`;
    const rows=resv.map(r=>{
      const st=status(r);
      const pax=(Number(r.adult)||0)+(Number(r.child)||0);
      const isSatis=String(r.satis).toUpperCase()==='TRUE'&&st==='done';
      const stLabel={pending:'',inside:'İ',done:'Ç',cancelled:'✕'}[st]||'';
      const stClass={pending:'rs-pending',inside:'rs-inside',done:'rs-done',cancelled:'rs-cancelled'}[st];
      return `<div class="res-row">
        <div class="res-status ${stClass}">${stLabel}</div>
        <div class="res-satis ${isSatis?'rs-satis-on':'rs-satis-off'}">S</div>
        <div class="res-info">
          <div class="res-time">${r.time}</div>
          <div class="res-detail">
            <div class="res-pax">${pax} kişi</div>
            <div class="res-nat">${r.nation||'—'}</div>
          </div>
        </div>
      </div>`;
    }).join('');
    return `<div class="hotel-card">
      <div class="hotel-hdr">
        <span class="hotel-icon">🏨</span>
        <span class="hotel-name">${hotel}</span>
        <div class="hotel-badges">${badges}</div>
      </div>
      ${rows}
    </div>`;
  }).join('');
}

// ── Rapor ─────────────────────────────────────────────────────
async function initRaporHotels() {
  const hotels = await getHotels();
  const sel = document.getElementById('rHotel');
  sel.innerHTML = '<option value="">— Tüm Oteller —</option>' +
    hotels.filter(h=>h.status==='ACTIVE').sort((a,b)=>String(a.hotel||'').localeCompare(String(b.hotel||''),'tr'))
      .map(h=>`<option value="${h.hotel}">${h.hotel}</option>`).join('');
  // Varsayılan tarih aralığı: bu ay
  if (!document.getElementById('rStart').value) {
    const t = todayStr();
    document.getElementById('rStart').value = t.slice(0,8)+'01';
    document.getElementById('rEnd').value   = t;
  }
}

async function loadRapor() {
  const s = document.getElementById('rStart').value;
  const e = document.getElementById('rEnd').value;
  const h = document.getElementById('rHotel').value;
  if (!s||!e) { alert('Tarih aralığı seçin'); return; }
  const rc = document.getElementById('raporContent');
  rc.innerHTML = '<div class="loading"><div class="spinner"></div>Yükleniyor...</div>';

  // Tüm rezervasyonları çek (tarih aralığı için tüm veriyi getirmeliyiz)
  const data = await fbGet('rezervasyonlar');
  let list = data ? Object.values(data) : [];

  // Tarih filtresi
  list = list.filter(r => r.date && r.date >= s && r.date <= e);
  // İptal olmayanlar
  list = list.filter(r => r.status !== 'CANCELLED');
  // Otel filtresi
  if (h) list = list.filter(r => r.hotel === h);

  if (!list.length) {
    rc.innerHTML = '<div class="loading" style="padding:30px"><div style="font-size:28px">📭</div>Bu aralıkta rezervasyon yok.</div>';
    return;
  }

  // Otele göre grupla
  const byHotel = {};
  list.forEach(r => {
    if (!byHotel[r.hotel]) byHotel[r.hotel] = [];
    byHotel[r.hotel].push(r);
  });
  const hotelKeys = Object.keys(byHotel).sort((a,b)=>a.localeCompare(b,'tr'));

  rc.innerHTML = hotelKeys.map(hn => {
    const rsvs = byHotel[hn];
    const tRez  = rsvs.length;
    const tPax  = rsvs.reduce((s,r)=>(Number(r.adult)||0)+(Number(r.child)||0)+s,0);
    const tSatis= rsvs.filter(r=>String(r.satis).toUpperCase()==='TRUE'&&String(r.cikti).toUpperCase()==='TRUE').length;
    const tBos  = rsvs.filter(r=>!(String(r.satis).toUpperCase()==='TRUE'&&String(r.cikti).toUpperCase()==='TRUE')).length;
    return `<div class="rapor-otel-card">
      <div class="rapor-otel-hdr">
        <span style="font-size:16px">🏨</span>
        <div class="rapor-otel-name">${hn}</div>
      </div>
      <div class="rapor-stats">
        <div class="rstat"><div class="rstat-val">${tRez}</div><div class="rstat-lbl">T.Rez</div></div>
        <div class="rstat"><div class="rstat-val">${tPax}</div><div class="rstat-lbl">T.Pax</div></div>
        <div class="rstat rstat-satis"><div class="rstat-val">${tSatis}</div><div class="rstat-lbl">T.Satış</div></div>
        <div class="rstat rstat-bos"><div class="rstat-val">${tBos}</div><div class="rstat-lbl">T.Boş</div></div>
      </div>
    </div>`;
  }).join('');
}

// ── Load ──────────────────────────────────────────────────────
async function load(){
  if (activeTab === 'list') {
    document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div>Yükleniyor...</div>';
  }
  try{
    const data=await apiGet('getReservations',{date:curDate});
    all=Array.isArray(data)?data:[];
    updateStats();
    if (activeTab === 'list') render();
    footer.innerText='Son güncelleme: '+new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }catch(e){
    document.getElementById('content').innerHTML='<div class="loading"><div style="font-size:28px">⚠️</div>Bağlantı hatası.</div>';
  }
}

async function refresh(){rbtn.classList.add('spin');await load();rbtn.classList.remove('spin');}
updateHdr();
load();
setInterval(load,15000);
</script>
</body>
</html>
