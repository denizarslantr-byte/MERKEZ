<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Piano Deri — Patron</title><style>
:root{--gold:#d6a63f;--gold2:#ffe58d;--bg:#070811;--card:#171923;--card2:#1d202b;--line:#2a2d3a;--text:#f4f4f5;--muted:#a1a1aa;--ok:#35d979;--warn:#d99022;--blue:#68d4ff;--red:#ff626e}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,"Segoe UI",sans-serif}.app{max-width:760px;margin:auto;padding:0 14px 22px}.topTitle{font-size:13px;letter-spacing:4px;color:var(--gold2);font-weight:900;padding:14px 4px;border-bottom:1px solid rgba(214,166,63,.28)}.tabs{display:grid;grid-template-columns:1fr 1fr;background:#11121b;border-bottom:1px solid #222432;margin:0 -14px 16px}.tab{border:0;background:transparent;color:#b9bbc5;padding:18px 8px;font-size:18px;font-weight:900;cursor:pointer;border-bottom:4px solid transparent}.tab.active{color:var(--gold2);border-bottom-color:var(--gold)}.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:14px;box-shadow:0 12px 28px rgba(0,0,0,.22)}.summary{display:flex;flex-direction:column;gap:3px}.stat{width:100%;background:#171922;border:2px solid #242735;border-radius:20px;min-height:86px;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer}.stat.active{border-color:rgba(214,166,63,.75);background:#17120f}.stat b{font-size:42px;line-height:1;color:var(--gold2)}.stat span{font-size:15px;font-weight:900;color:#9ea0aa;letter-spacing:.5px;margin-top:8px}.stat.total b,.stat.inside b{color:var(--gold2)}.stat.wait b{color:#f4f4f5}.stat.done b{color:#b9ffd0}.stat.sale{background:#0d1820;border-color:rgba(53,217,121,.46)}.stat.sale b{color:var(--blue)}.stat.emptyStat{background:#101720;border-color:rgba(53,217,121,.46)}.stat.emptyStat b{color:var(--red)}.filters{display:flex;gap:8px;overflow:auto;padding:2px 0 10px}.chip{white-space:nowrap;border:1px solid #2a2d38;border-radius:999px;background:#171922;color:#d7d7dd;padding:10px 14px;font-weight:900;cursor:pointer}.chip.active{background:#2a2111;border-color:var(--gold);color:var(--gold2)}.hotelHead{margin:10px 2px 8px;color:#c9c9d1;font-weight:900;letter-spacing:.3px;border-bottom:1px solid #2a2d38;padding-bottom:8px}.resCard{position:relative;background:#181b27;border:1px solid #2a2d38;border-radius:18px;margin:12px 0;padding:18px 96px 18px 24px;min-height:112px;overflow:hidden}.resCard:before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:#aeb3c4}.resCard.done:before{background:var(--ok)}.resCard.inside:before{background:var(--gold2)}.resTime{font-size:34px;font-weight:900;color:var(--gold2);line-height:1}.resDate{color:#a8a8b1;font-size:17px;font-weight:700;margin:3px 0 20px}.resMeta{color:#c3c4cc;font-size:18px;font-weight:800}.badge{position:absolute;right:18px;top:28px;border-radius:999px;padding:8px 12px;font-size:14px;font-weight:900;border:2px solid #343846}.badge.wait{color:#f4f4f5;background:#26303c}.badge.inside{color:#ffe58d;background:#5b390d;border-color:#915d12}.badge.done{color:#d8ffe2;background:#0d5e35;border-color:#168a4e}.emptyBox{padding:32px;text-align:center;color:var(--muted);font-weight:800}.toolbar{display:grid;gap:10px}.toolbar label{font-size:13px;color:#aeb0ba;font-weight:900;text-transform:uppercase}.toolbar input,.toolbar select{width:100%;background:#262631;border:1px solid #383a47;border-radius:10px;color:#fff;padding:13px 14px;font-size:16px}.btn{border:0;border-radius:11px;background:linear-gradient(135deg,#f0cf70,#c28f2e);color:#171000;padding:14px;font-weight:900;font-size:16px;cursor:pointer}.reportCard{background:#171923;border:1px solid #2a2d38;border-radius:18px;margin:14px 0;overflow:hidden}.reportTitle{background:#242128;color:var(--gold2);font-size:18px;font-weight:900;padding:14px}.reportStats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px}.rBox{background:#11131d;border:1px solid #2a2d38;border-radius:12px;text-align:center;padding:13px 6px}.rBox b{display:block;font-size:26px;color:var(--gold2)}.rBox span{font-size:11px;color:#a0a0a9;font-weight:900}.rSale{background:#122032;border-color:#205a76}.rSale b{color:var(--blue)}.rBos{background:#251925;border-color:#76384b}.rBos b{color:var(--red)}.hide{display:none}@media(min-width:900px){.app{max-width:980px}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat{min-height:112px}.toolbar{grid-template-columns:1fr 1fr 1fr auto;align-items:end}.reportStats{grid-template-columns:repeat(4,1fr)}}

/* V9: kart arası açılır liste ve küçük yazı düzeni */
.summary{gap:6px}.stat{min-height:74px;border-radius:18px}.stat b{font-size:34px}.stat span{font-size:13px;margin-top:6px}.inlineList{background:#171923;border:1px solid rgba(214,166,63,.34);border-radius:18px;margin:6px 0 10px;padding:10px;overflow:hidden}.inlineList .filters{padding:0 0 8px}.inlineList .chip{font-size:13px;padding:8px 12px}.inlineList .hotelHead{font-size:14px;margin:8px 2px 6px}.resCard{border-radius:14px;margin:8px 0;padding:12px 78px 12px 18px;min-height:78px}.resTime{font-size:27px}.resDate{font-size:13px;margin:2px 0 10px}.resMeta{font-size:13px}.badge{right:12px;top:18px;padding:6px 9px;font-size:11px}.miniTable{width:100%;border-collapse:collapse;font-size:13px}.miniTable th{background:#101119;color:var(--gold2);font-size:12px;text-align:left;padding:9px 6px}.miniTable td{padding:10px 6px;border-bottom:1px solid #2a2d38;color:#eee}.miniTable .time{color:var(--gold2);font-weight:900;font-size:16px}.miniHotel{color:var(--gold2);font-size:16px;font-weight:900;margin:12px 2px 8px}.miniWrap{overflow:auto}.dailyBottom{display:none}@media(min-width:900px){.summary{display:flex;flex-direction:column;gap:6px}.stat{min-height:82px}.stat b{font-size:38px}}
</style></head><body><div class="app"><div class="topTitle">* PATRON PANELİ</div><div class="tabs"><button id="tabDaily" class="tab active" onclick="openTab('daily')">▱ Günlük Liste</button><button id="tabReport" class="tab" onclick="openTab('report')">▥ Rapor</button></div>
<section id="dailyPage"><div class="summary" id="summaryBox"></div><div class="filters" id="hotelChips"></div><div id="dailyList" class="dailyBottom"></div></section>
<section id="reportPage" class="hide"><div class="panel toolbar"><div><label>Başlangıç Tarihi</label><input type="date" id="rStart"></div><div><label>Bitiş Tarihi</label><input type="date" id="rEnd"></div><div><label>Otel (Opsiyonel)</label><select id="rHotel"><option value="">— Tüm Oteller —</option></select></div><button class="btn" onclick="loadReport()">⌕ Göster</button></div><div id="report"></div></section></div>
<script src="../config/config.js?v=20260515-patron-v9"></script><script src="../config/firebase.js?v=20260515-patron-v9"></script><script src="../assets/common.js?v=20260515-patron-v9"></script><script src="../assets/firebase-api.js?v=20260515-patron-v9"></script><script>
let allDaily=[],hotels=[],selectedHotel='',selectedFilter='';
const pax=r=>(Number(r.adult)||0)+(Number(r.child)||0);const sale=r=>String(r.satis).toUpperCase()==='TRUE';const done=r=>String(r.cikti).toUpperCase()==='TRUE';const inside=r=>String(r.girdi).toUpperCase()==='TRUE'&&!done(r);const wait=r=>!inside(r)&&!done(r);const trDate=d=>(d||'').split('-').reverse().join('/');
function statusClass(r){return done(r)?'done':inside(r)?'inside':'wait'}function statusText(r){return done(r)?'ÇIKTI':inside(r)?'İÇERİDE':'BEKLİYOR'}
function getVisible(){return allDaily.filter(r=>(!selectedHotel||r.hotel===selectedHotel)&& (selectedFilter==='total'||(selectedFilter==='wait'&&wait(r))||(selectedFilter==='inside'&&inside(r))||(selectedFilter==='done'&&done(r))||(selectedFilter==='sale'&&sale(r))||(selectedFilter==='empty'&&!sale(r))));}
function counts(list){return{total:list.length,wait:list.filter(wait).length,inside:list.filter(inside).length,done:list.filter(done).length,sale:list.filter(sale).length,empty:list.filter(r=>!sale(r)).length}}
function renderSummary(){const c=counts(allDaily.filter(r=>!selectedHotel||r.hotel===selectedHotel));const items=[['total','Toplam','total'],['wait','Bekleyen','wait'],['inside','İçeride','inside'],['done','Tamamlandı','done'],['sale','Satış ✦','sale'],['empty','Boş ✦','emptyStat']];summaryBox.innerHTML=items.map(([k,t,cls])=>`<div class="stat ${cls} ${selectedFilter===k?'active':''}" onclick="setFilter('${k}')"><b>${c[k]}</b><span>${t}</span></div>${selectedFilter===k?renderInlineList():''}`).join('')}
function esc(v){return String(v||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function renderChips(){const names=[...new Set(allDaily.map(r=>r.hotel).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'tr'));return `<div class="filters"><button class="chip ${!selectedHotel?'active':''}" onclick="setHotel('')">Tüm Oteller</button>`+names.map(h=>`<button class="chip ${selectedHotel===h?'active':''}" onclick="setHotel(decodeURIComponent('${encodeURIComponent(h)}'))">${esc(h)}</button>`).join('')+`</div>`}
function renderInlineList(){const list=getVisible().sort((a,b)=>String(a.hotel||'').localeCompare(String(b.hotel||''),'tr')||String(a.time||'').localeCompare(String(b.time||'')));let body='';if(!list.length){body='<div class="emptyBox">Seçili bilgi için kayıt yok.</div>'}else{const groups={};list.forEach(r=>(groups[r.hotel||'İsimsiz Otel']??=[]).push(r));body=Object.keys(groups).sort((a,b)=>a.localeCompare(b,'tr')).map(h=>{const g=groups[h];return `<div class="miniHotel">🏨 ${esc(h)}</div><div class="miniWrap"><table class="miniTable"><thead><tr><th>SAAT</th><th>PAX</th><th>UYRUK</th><th>DURUM</th><th>SATIŞ</th><th>NOT</th></tr></thead><tbody>`+g.map(r=>`<tr><td class="time">${esc(r.time)}</td><td>${pax(r)}</td><td>${esc(r.nation)}</td><td>${statusText(r)}</td><td>${sale(r)?'SATIŞ':'Boş'}</td><td>${esc(r.note||r.not||'')}</td></tr>`).join('')+`</tbody></table></div>`}).join('')}return `<div class="inlineList">${renderChips()}${body}</div>`}
function renderList(){dailyList.innerHTML=''}
function setFilter(k){selectedFilter=selectedFilter===k?'':k;renderSummary();renderList()}function setHotel(h){selectedHotel=h;renderSummary();renderList()}
async function loadDaily(){dailyList.innerHTML='<div class="panel emptyBox">Yükleniyor...</div>';allDaily=(await getReservations(todayStr())).filter(r=>r.status!=='CANCELLED');renderSummary();renderList()}
async function fillHotels(){hotels=await getHotels();const names=[...new Set(hotels.map(h=>h.hotel).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'tr'));rHotel.innerHTML='<option value="">— Tüm Oteller —</option>'+names.map(h=>`<option value="${h}">${h}</option>`).join('')}
function openTab(t){tabDaily.classList.toggle('active',t==='daily');tabReport.classList.toggle('active',t==='report');dailyPage.classList.toggle('hide',t!=='daily');reportPage.classList.toggle('hide',t!=='report');if(t==='report')loadReport()}
async function loadReport(){report.innerHTML='<div class="panel emptyBox">Yükleniyor...</div>';const s=rStart.value,e=rEnd.value,h=rHotel.value;let all=(await getReservations()).filter(r=>r.status!=='CANCELLED'&&(!s||r.date>=s)&&(!e||r.date<=e)&&(!h||r.hotel===h));const groups={};all.forEach(r=>(groups[r.hotel||'İsimsiz Otel']??=[]).push(r));const html=Object.keys(groups).sort((a,b)=>a.localeCompare(b,'tr')).map(hotel=>{const l=groups[hotel],c={rez:l.length,pax:l.reduce((s,r)=>s+pax(r),0),satis:l.filter(sale).length,bos:l.filter(r=>!sale(r)).length};return `<div class="reportCard"><div class="reportTitle">▣ ${hotel}</div><div class="reportStats"><div class="rBox"><b>${c.rez}</b><span>T.REZ</span></div><div class="rBox"><b>${c.pax}</b><span>T.PAX</span></div><div class="rBox rSale"><b>${c.satis}</b><span>T.SATIŞ</span></div><div class="rBox rBos"><b>${c.bos}</b><span>T.BOŞ</span></div></div></div>`}).join('');report.innerHTML=html||'<div class="panel emptyBox">Kayıt yok.</div>'}
rStart.value=todayStr();rEnd.value=todayStr();fillHotels();loadDaily();setInterval(loadDaily,15000);
</script></body></html>
