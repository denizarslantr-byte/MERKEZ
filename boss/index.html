<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Piano Deri — Patron</title><style>
:root{--gold:#d8aa4b;--gold2:#f1d48a;--bg:#080808;--card:#17181f;--card2:#20222b;--text:#f3f4f6;--muted:#9ca3af;--b:rgba(216,170,75,.32);--ok:#22c55e;--warn:#f59e0b;--blue:#60a5fa}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,"Segoe UI",sans-serif;font-size:14px}.app{padding:14px;max-width:1280px;margin:auto}.brand{text-align:center;padding:8px 0 18px}.brand .p{font-family:Georgia,serif;font-size:44px;color:var(--gold2);line-height:.8}.brand .n{font-family:Georgia,serif;letter-spacing:6px;font-size:25px}.brand .s{color:var(--gold);letter-spacing:4px;font-size:11px}.panel{background:var(--card);border:1px solid var(--b);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 12px 34px rgba(0,0,0,.25)}.toolbar{display:flex;gap:10px;align-items:end;flex-wrap:wrap}.toolbar>div{display:flex;flex-direction:column;gap:5px}label{font-size:11px;color:var(--gold2);font-weight:700;text-transform:uppercase}input,select{background:#0d0e13;border:1px solid rgba(255,255,255,.12);border-radius:8px;color:var(--text);padding:10px 11px;min-width:160px}.btn{border:0;border-radius:9px;padding:10px 14px;font-weight:800;cursor:pointer}.btn-gold{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#1a1204}.btn-dark{background:#262832;color:var(--gold2);border:1px solid rgba(255,255,255,.1)}.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}.stat{background:var(--card2);border:1px solid rgba(255,255,255,.08);border-radius:12px;text-align:center;padding:12px}.stat b{display:block;font-size:26px;color:var(--gold2)}.stat span{font-size:11px;color:var(--muted);text-transform:uppercase}.tablewrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:13px}th{color:var(--gold2);font-size:11px;text-transform:uppercase;text-align:left;background:#101116}th,td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.07)}tr:hover{background:rgba(255,255,255,.03)}.hotel-title{font-weight:900;color:var(--gold2);font-size:16px;margin:14px 0 6px}.mini{font-size:12px;color:var(--muted)}.badge{display:inline-block;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:800}.sale{background:rgba(34,197,94,.18);color:#86efac}.empty{padding:28px;text-align:center;color:var(--muted)}@media(max-width:760px){.grid{grid-template-columns:repeat(2,1fr)}.brand .n{font-size:18px}.toolbar{display:block}.toolbar>div{margin-bottom:8px}input,select{width:100%}}
</style></head><body><div class="app"><div class="brand"><div class="p">P</div><div class="n">PIANO DERİ</div><div class="s">PATRON PANELİ</div></div><div class="panel toolbar"><div><label>Tarih</label><input type="date" id="date1"></div><div><label>Otel</label><select id="dailyHotel"><option value="">Tüm Oteller</option></select></div><button class="btn btn-gold" onclick="loadDaily()">Göster</button><button class="btn btn-dark" onclick="loadDaily()">↺ Yenile</button><button class="btn btn-dark" onclick="showReport()">📊 Rapor</button></div><div class="panel"><div class="grid"><div class="stat"><b id="stRes">0</b><span>Rezervasyon</span></div><div class="stat"><b id="stPax">0</b><span>Pax</span></div><div class="stat"><b id="stInside">0</b><span>İçeride</span></div><div class="stat"><b id="stDone">0</b><span>Tamamlandı</span></div><div class="stat"><b id="stBos">0</b><span>Boş</span></div><div class="stat"><b id="stSatis">0</b><span>Satış</span></div></div></div><div id="daily" class="panel tablewrap"></div><div id="reportPanel" class="panel" style="display:none"><h2 style="color:var(--gold2);margin-top:0">📊 Patron Raporu</h2><div class="toolbar"><div><label>Başlangıç</label><input type="date" id="rStart"></div><div><label>Bitiş</label><input type="date" id="rEnd"></div><div><label>Otel</label><select id="rHotel"><option value="">Tüm Oteller</option></select></div><button class="btn btn-gold" onclick="loadReport()">Göster</button></div><div id="report" style="margin-top:12px"></div></div><div class="mini" id="footer"></div></div><script src="../config/config.js?v=20260515-final-reports"></script>
<script src="../config/firebase.js?v=20260515-final-reports"></script>
<script src="../assets/common.js?v=20260515-final-reports"></script>
<script src="../assets/firebase-api.js?v=20260515-final-reports"></script><script>
let dailyData=[], hotels=[]; const pax=r=>(Number(r.adult)||0)+(Number(r.child)||0); const isSale=r=>String(r.satis).toUpperCase()==='TRUE';
function byHotelTime(a,b){return String(a.hotel||'').localeCompare(String(b.hotel||''),'tr')||String(a.time||'').localeCompare(String(b.time||''));}
function row(r){return `<tr><td>${r.hotel||''}</td><td><b>${r.time||''}</b></td><td>${pax(r)}</td><td>${r.nation||''}</td><td>${isSale(r)?'<span class="badge sale">SATIŞ</span>':'Boş'}</td></tr>`;}
function summary(list){stRes.innerText=list.length;stPax.innerText=list.reduce((s,r)=>s+pax(r),0);stInside.innerText=list.filter(r=>String(r.girdi).toUpperCase()==='TRUE'&&String(r.cikti).toUpperCase()!=='TRUE').length;stDone.innerText=list.filter(r=>String(r.cikti).toUpperCase()==='TRUE').length;stSatis.innerText=list.filter(isSale).length;stBos.innerText=list.filter(r=>!isSale(r)).length;}
async function fillHotels(){hotels=await getHotels(); const names=[...new Set(hotels.map(h=>h.hotel).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'tr')); const opts='<option value="">Tüm Oteller</option>'+names.map(h=>`<option value="${h}">${h}</option>`).join(''); rHotel.innerHTML=opts; dailyHotel.innerHTML=opts;}
async function loadDaily(){daily.innerHTML='<div class="empty">Yükleniyor...</div>'; const selectedHotel=dailyHotel.value; dailyData=await getReservations(date1.value); dailyData=dailyData.filter(r=>r.status!=='CANCELLED'&&(!selectedHotel||r.hotel===selectedHotel)).sort(byHotelTime); summary(dailyData); daily.innerHTML=dailyData.length?`<h2 style="color:var(--gold2);margin-top:0">Günlük Rezervasyon Listesi</h2><table><thead><tr><th>Otel Adı</th><th>Saat</th><th>Pax</th><th>Uyruk</th><th>Satış</th></tr></thead><tbody>${dailyData.map(row).join('')}</tbody></table>`:'<div class="empty">Seçilen gün/otel için rezervasyon yok.</div>'; footer.innerText='Son güncelleme: '+new Date().toLocaleTimeString('tr-TR');}
function showReport(){reportPanel.style.display=reportPanel.style.display==='none'?'block':'none';}
async function loadReport(){const s=rStart.value,e=rEnd.value,h=rHotel.value; report.innerHTML='<div class="empty">Yükleniyor...</div>'; let all=await getReservations(); all=all.filter(r=>r.status!=='CANCELLED'&&(!s||r.date>=s)&&(!e||r.date<=e)&&(!h||r.hotel===h)).sort(byHotelTime); const groups={}; all.forEach(r=>(groups[r.hotel||'İsimsiz Otel']??=[]).push(r)); const rows=Object.keys(groups).sort((a,b)=>a.localeCompare(b,'tr')).map(hotel=>{const list=groups[hotel]; const tRez=list.length,tPax=list.reduce((s,r)=>s+pax(r),0),tSatis=list.filter(isSale).length,tBos=tRez-tSatis; return `<tr><td><b>🏨 ${hotel}</b></td><td>${tRez}</td><td>${tPax}</td><td>${tSatis}</td><td>${tBos}</td></tr>`;}).join(''); report.innerHTML=rows?`<div class="tablewrap"><table><thead><tr><th>Otel Adı</th><th>T.Rez</th><th>T.Pax</th><th>T.Satış</th><th>T.Boş</th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="empty">Kayıt yok.</div>';}
date1.value=todayStr(); rStart.value=todayStr(); rEnd.value=todayStr(); fillHotels(); loadDaily(); setInterval(loadDaily,10000);
</script></body></html>
