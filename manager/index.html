<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Piano Deri — Yönetici</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="../assets/piano-theme.css">
  <link rel="stylesheet" href="../assets/theme-overrides.css">
  <style>
    .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
    .stat{background:var(--bg3);border:1px solid var(--border);border-radius:12px;text-align:center;padding:12px}
    .stat b{display:block;font-size:26px;color:var(--gold2)}
    .stat span{font-size:11px;color:var(--text2);text-transform:uppercase}
    .hotel-title{font-weight:900;color:var(--gold2);font-size:16px;margin:14px 0 6px}
    .badge-sale{background:rgba(34,197,94,.18);color:#86efac;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:800}
    @media(max-width:760px){.grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<div class="app">

  <div class="app-brand">
    <div class="p">P</div>
    <div class="name">PIANO DERİ</div>
    <div class="sub">YÖNETİCİ PANELİ</div>
  </div>

  <!-- Araç çubuğu -->
  <div class="panel-card" style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
    <div>
      <label style="font-size:11px;color:var(--gold2);font-weight:700;text-transform:uppercase">Tarih</label>
      <input type="date" id="date1" class="input-std" style="min-width:160px">
    </div>
    <div>
      <label style="font-size:11px;color:var(--gold2);font-weight:700;text-transform:uppercase">Otel</label>
      <select id="hotelSel" class="input-std" style="min-width:180px">
        <option value="">Tüm Oteller</option>
      </select>
    </div>
    <div id="realtimeBadge" style="font-size:11px;color:#22c55e;font-weight:700;align-self:center">● Canlı</div>
  </div>

  <!-- İstatistikler -->
  <div class="panel-card">
    <div class="grid">
      <div class="stat"><b id="stRes">0</b><span>Rezervasyon</span></div>
      <div class="stat"><b id="stPax">0</b><span>Pax</span></div>
      <div class="stat"><b id="stPending">0</b><span>Bekleyen</span></div>
      <div class="stat"><b id="stInside">0</b><span>İçeride</span></div>
      <div class="stat"><b id="stDone">0</b><span>Tamamlandı</span></div>
      <div class="stat"><b id="stSatis">0</b><span>Satış</span></div>
    </div>
  </div>

  <!-- Rezervasyon listesi -->
  <div class="panel-card table-wrap" id="list">
    <div style="text-align:center;color:var(--text2);padding:20px">Yükleniyor...</div>
  </div>

  <div style="font-size:11px;color:var(--text2);margin-top:6px" id="footer"></div>
</div>

<!-- Bağımlılıklar -->
<script src="../config/config.js"></script>
<script src="../config/firebase.js"></script>
<script src="../assets/common.js"></script>
<script src="../assets/firebase-api.js"></script>

<!-- Servis katmanı -->
<script src="services/manager-service.js"></script>
<script src="utils/manager-utils.js"></script>

<script>
// ── Yardımcılar ───────────────────────────────────────────────
const pax    = r => (Number(r.adult)||0) + (Number(r.child)||0);
const status = r => r.status === 'CANCELLED' ? 'İPTAL'
                  : String(r.cikti).toUpperCase() === 'TRUE' ? 'ÇIKTI'
                  : String(r.girdi).toUpperCase() === 'TRUE' ? 'İÇERİDE'
                  : 'BEKLİYOR';

// ── State ─────────────────────────────────────────────────────
let all = [];
let _managerUnsub = null;

// ── İstatistikleri güncelle ───────────────────────────────────
function updateStats(data) {
  stRes.innerText     = data.length;
  stPax.innerText     = data.reduce((s, r) => s + pax(r), 0);
  stPending.innerText = data.filter(r => status(r) === 'BEKLİYOR').length;
  stInside.innerText  = data.filter(r => status(r) === 'İÇERİDE').length;
  stDone.innerText    = data.filter(r => status(r) === 'ÇIKTI').length;
  stSatis.innerText   = data.filter(r => String(r.satis).toUpperCase() === 'TRUE').length;
}

// ── Filtreleme ────────────────────────────────────────────────
function filt() {
  const h = hotelSel.value;
  return all
    .filter(r => !h || r.hotel === h)
    .sort((a, b) =>
      String(a.hotel||'').localeCompare(String(b.hotel||''), 'tr') ||
      String(a.time||'').localeCompare(String(b.time||''))
    );
}

// ── Render ────────────────────────────────────────────────────
function render() {
  const data = filt();
  updateStats(data);

  const groups = {};
  data.forEach(r => (groups[r.hotel] ??= []).push(r));

  const esc = ManagerUtils ? ManagerUtils.esc : (s => String(s ?? ''));

  list.innerHTML = Object.keys(groups)
    .sort((a, b) => a.localeCompare(b, 'tr'))
    .map(h => `
      <div class="hotel-title">🏨 ${esc(h)}</div>
      <div class="table-wrap">
        <table class="table" style="width:100%">
          <thead><tr>
            <th>Saat</th><th>Pax</th><th>Uyruk</th>
            <th>Durum</th><th>Satış</th><th>Not</th>
          </tr></thead>
          <tbody>
            ${groups[h]
              .sort((a, b) => String(a.time||'').localeCompare(String(b.time||'')))
              .map(r => `
                <tr>
                  <td><b>${esc(r.time||'')}</b></td>
                  <td>${pax(r)}</td>
                  <td>${esc(r.nation||'')}</td>
                  <td>${esc(status(r))}</td>
                  <td>${String(r.satis).toUpperCase()==='TRUE'?'<span class="badge-sale">SATIŞ</span>':'—'}</td>
                  <td>${esc(r.notes||'')}</td>
                </tr>`).join('')}
          </tbody>
        </table>
      </div>`)
    .join('') || '<div style="text-align:center;color:var(--text2);padding:28px">Rezervasyon yok.</div>';

  footer.innerText = 'Son güncelleme: ' + new Date().toLocaleTimeString('tr-TR');
}

// ── Otel dropdown doldurucu ───────────────────────────────────
async function fillHotels() {
  try {
    const hotels = await getHotels();
    const names  = [...new Set(hotels.map(h => h.hotel).filter(Boolean))]
                   .sort((a, b) => a.localeCompare(b, 'tr'));
    const esc    = ManagerUtils ? ManagerUtils.esc : (s => String(s ?? ''));
    hotelSel.innerHTML = '<option value="">Tüm Oteller</option>' +
      names.map(h => `<option value="${esc(h)}">${esc(h)}</option>`).join('');
  } catch(e) {
    if (typeof reportClientError === 'function') reportClientError('manager:fillHotels', e);
  }
}

// ── Realtime subscribe (ManagerService üzerinden) ─────────────
function subscribeDate(date) {
  if (typeof _managerUnsub === 'function') _managerUnsub(); // önceki listener'ı kapat

  realtimeBadge.textContent = '⏳ Bağlanıyor...';
  realtimeBadge.style.color = '#f59e0b';

  _managerUnsub = ManagerService.subscribeDate(date, rows => {
    all = Array.isArray(rows) ? rows : [];
    render();
    realtimeBadge.textContent = '● Canlı';
    realtimeBadge.style.color = '#22c55e';
  });
}

// ── Init ──────────────────────────────────────────────────────
date1.value = todayStr();
hotelSel.addEventListener('change', render);
date1.addEventListener('change', () => subscribeDate(date1.value));

fillHotels();
subscribeDate(date1.value);
</script>

<script src="../assets/theme-manager.js"></script>
</body>
</html>
